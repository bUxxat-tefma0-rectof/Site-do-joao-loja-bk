<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Cliente - Plataforma Digital</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary: #6C63FF;
            --dark: #0f0f1a;
            --sidebar: #1a1a2e;
            --card: #1e1e36;
            --text: #b0b0b8;
            --white: #ffffff;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid #2d2d44;
            padding: 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
            transition: 0.3s;
        }
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0 20px;
            border-bottom: 1px solid #2d2d44;
            margin-bottom: 20px;
        }
        .sidebar-logo img {
            height: 35px;
        }
        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .sidebar-user img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }
        .sidebar-user-info h4 {
            color: var(--white);
            font-size: 0.9rem;
        }
        .sidebar-user-info span {
            color: var(--text);
            font-size: 0.75rem;
        }
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: 10px;
            color: var(--text);
            text-decoration: none;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .sidebar-nav a:hover, .sidebar-nav a.active {
            background: rgba(108,99,255,0.15);
            color: var(--white);
        }
        .sidebar-nav a.active {
            background: var(--primary);
            color: var(--white);
        }
        .sidebar-nav a i {
            width: 20px;
            text-align: center;
        }
        .sidebar-footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
        }
        .sidebar-footer a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            color: #EF4444;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }
        .sidebar-footer a:hover {
            background: rgba(239,68,68,0.1);
        }

        /* MAIN */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 20px;
            min-height: 100vh;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            margin-bottom: 20px;
        }
        .topbar h1 {
            color: var(--white);
            font-size: 1.5rem;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #2d2d44;
            background: var(--card);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .btn-icon:hover {
            background: var(--primary);
            color: var(--white);
        }
        .badge {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* CARDS */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: var(--card);
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 20px;
            transition: 0.3s;
        }
        .stat-card:hover {
            border-color: var(--primary);
            transform: translateY(-3px);
        }
        .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .stat-card-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .stat-card-icon.blue { background: rgba(108,99,255,0.2); color: #6C63FF; }
        .stat-card-icon.green { background: rgba(16,185,129,0.2); color: #10B981; }
        .stat-card-icon.orange { background: rgba(245,158,11,0.2); color: #F59E0B; }
        .stat-card-icon.red { background: rgba(239,68,68,0.2); color: #EF4444; }
        .stat-card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--white);
        }
        .stat-card-label {
            color: var(--text);
            font-size: 0.85rem;
            margin-top: 4px;
        }

        /* TABS */
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .section-card {
            background: var(--card);
            border: 1px solid #2d2d44;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .section-card h3 {
            color: var(--white);
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 0;
                padding: 0;
                overflow: hidden;
            }
            .sidebar.open {
                width: 260px;
                padding: 20px;
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block !important;
            }
        }
        .menu-toggle {
            display: none;
            background: var(--primary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <img src="https://via.placeholder.com/120x35/6C63FF/fff?text=LOGO" alt="Logo">
        </div>
        <div class="sidebar-user">
            <img src="https://via.placeholder.com/45/6C63FF/fff?text=U" alt="User" id="sidebarAvatar">
            <div class="sidebar-user-info">
                <h4 id="sidebarNome">Usuário</h4>
                <span id="sidebarPlano">Plano Básico</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="active" data-tab="dashboard"><i class="fas fa-th-large"></i> Dashboard</a>
            <a href="#" data-tab="compras"><i class="fas fa-shopping-bag"></i> Minhas Compras</a>
            <a href="#" data-tab="pagamentos"><i class="fas fa-credit-card"></i> Pagamentos</a>
            <a href="#" data-tab="assinaturas"><i class="fas fa-sync"></i> Assinaturas</a>
            <a href="#" data-tab="downloads"><i class="fas fa-download"></i> Downloads</a>
            <a href="#" data-tab="tickets"><i class="fas fa-ticket-alt"></i> Suporte</a>
            <a href="#" data-tab="perfil"><i class="fas fa-user-cog"></i> Meu Perfil</a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="topbar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <h1 id="pageTitle">Dashboard</h1>
            </div>
            <div class="topbar-actions">
                <button class="btn-icon" title="Notificações" onclick="mostrarNotificacoes()">
                    <i class="fas fa-bell"></i>
                    <span class="badge">3</span>
                </button>
                <button class="btn-icon" title="Chat ao vivo" onclick="abrirChat()">
                    <i class="fas fa-comment-dots"></i>
                </button>
            </div>
        </div>

        <!-- Conteúdo das abas será inserido aqui -->
        <div id="tabContent"></div>
    </main>

    <script>
        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        const usuarioLogado = JSON.parse(localStorage.getItem('usuarioLogado') || sessionStorage.getItem('usuarioLogado') || '{}');

        if (!usuarioLogado.nome) {
            window.location.href = 'login.html';
        }

        // Atualizar sidebar
        document.getElementById('sidebarNome').textContent = usuarioLogado.nome || 'Usuário';
        document.getElementById('sidebarAvatar').src = `https://ui-avatars.com/api/?name=${usuarioLogado.nome}+${usuarioLogado.sobrenome}&background=6C63FF&color=fff&size=45`;

        // ============================================
        // NAVEGAÇÃO DAS ABAS
        // ============================================
        document.querySelectorAll('.sidebar-nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.sidebar-nav a').forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                const tab = this.getAttribute('data-tab');
                document.getElementById('pageTitle').textContent = this.textContent.trim();
                carregarAba(tab);
            });
        });

        function carregarAba(tab) {
            const container = document.getElementById('tabContent');
            switch(tab) {
                case 'dashboard':
                    container.innerHTML = carregarDashboard();
                    break;
                case 'compras':
                    container.innerHTML = carregarCompras();
                    break;
                case 'pagamentos':
                    container.innerHTML = carregarPagamentos();
                    break;
                case 'assinaturas':
                    container.innerHTML = carregarAssinaturas();
                    break;
                case 'downloads':
                    container.innerHTML = carregarDownloads();
                    break;
                case 'tickets':
                    container.innerHTML = carregarTickets();
                    break;
                case 'perfil':
                    container.innerHTML = carregarPerfil();
                    break;
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function logout() {
            localStorage.removeItem('usuarioLogado');
            sessionStorage.removeItem('usuarioLogado');
            window.location.href = 'login.html';
        }

        function mostrarNotificacoes() {
            alert('🔔 Notificações:\n\n• Pagamento confirmado\n• Novo produto disponível\n• Suporte respondeu seu ticket');
        }

        function abrirChat() {
            alert('💬 Chat ao vivo será aberto em breve!');
        }

        // ============================================
        // CARREGAR DASHBOARD (Aba inicial)
        // ============================================
        carregarAba('dashboard');
    </script>
</body>
</html>
